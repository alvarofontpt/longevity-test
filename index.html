// ─── SCORING ─────────────────────────────────────────────────────────────────
function calcScore(v,t){if(v<t[0])return 1;if(v<t[1])return 2;if(v<t[2])return 3;if(v<t[3])return 4;return 5;}
function scoreGrip(v,ab,g){const t=TABLES.grip[ab]?.[g];return t?calcScore(parseFloat(v),t):0;}
function scoreChair(v,ab,g){const t=TABLES.chair[ab]?.[g];return t?calcScore(parseFloat(v),t):0;}
function scorePushups(v,ab,g,variant){const tbl=variant==="knees"?TABLES.pushups_knees:TABLES.pushups;const t=tbl[ab]?.[g];return t?calcScore(parseFloat(v),t):0;}
function scoreBalance(v,ab,g,eyesClosed){if(!v)return 0;const fv=parseFloat(v);if(eyesClosed){const tbl=g==="m"?TABLES.balance_oc_m:TABLES.balance_oc_f;const t=tbl[ab];if(!t)return scoreBalance(v,ab,g,false);return calcScore(fv,t);}const t=TABLES.balance_oa[ab];return t?calcScore(fv,t):0;}
function scoreSRT(v,ab){const t=TABLES.srt[ab];return t?calcScore(parseFloat(v),t):0;}
function scoreCooper(v,ab,act,g){if(!v)return 0;const fv=parseFloat(v);const use6=(ab==="51_65"&&act==="sedentary")||ab==="66_75"||ab==="over75";if(use6){const t=TABLES.cooper6[ab]?.[g];return t?calcScore(fv,t):0;}const t=TABLES.cooper12[ab]?.[g];return t?calcScore(fv,t):0;}
function scoreDeadhang(v,ab,g){if(!v||!TABLES.deadhang[ab])return 0;const t=TABLES.deadhang[ab]?.[g];return t?calcScore(parseFloat(v),t):0;}

function getLabel(s){
  if(s>=5)return{text:"Excelente",color:"#5ab87a"};
  if(s>=4)return{text:"Bueno",color:"#8ab4d4"};
  if(s>=3)return{text:"Normal",color:"#c8a45a"};
  if(s>=2)return{text:"Deficiente",color:"#e8a05a"};
  if(s>=1)return{text:"Muy deficiente",color:"#d45a5a"};
  return{text:"Sin datos",color:"#888"};
}
function getTotalLabel(pct){
  if(pct>=90)return{text:"Rendimiento Elite",color:"#5ab87a",desc:"Condición física excepcional. Mantener y optimizar."};
  if(pct>=75)return{text:"Buen Estado",color:"#8ab4d4",desc:"Por encima de la media. Margen de mejora en áreas específicas."};
  if(pct>=55)return{text:"Estado Medio",color:"#c8a45a",desc:"Condición funcional aceptable con déficits claros a trabajar."};
  if(pct>=35)return{text:"Deficiente",color:"#e8a05a",desc:"Riesgo funcional moderado. Programa de mejora prioritario."};
  return{text:"Atención Prioritaria",color:"#d45a5a",desc:"Riesgo funcional elevado. Intervención inmediata recomendada."};
}

// ─── VARIANT HELPERS ─────────────────────────────────────────────────────────
function getPushV(ab,act){
  if(ab==="over75")return{label:"Flexiones en pared",note:"Manos en pared o banco. Sin bajar al suelo."};
  if(ab==="66_75"||(ab==="51_65"&&act==="sedentary"))return{label:"Flexiones desde rodillas",note:"Rodillas en suelo, cuerpo alineado. Pecho roza suelo."};
  return{label:"Flexiones completas",note:"Plancha completa. Cuerpo recto de cabeza a talones."};
}
function getBalV(ab,act){
  const ec=ab==="u35"||ab==="36_50"||(ab==="51_65"&&act==="active");
  const nw=ab==="66_75"||ab==="over75";
  return{eyesClosed:ec,nearWall:nw,
    label:ec?"Monopodal · Ojos cerrados":"Monopodal · Ojos abiertos",
    note:ec?"OJOS CERRADOS. Ambas piernas. Máx. 60 seg.":nw?"OJOS ABIERTOS. Cerca de pared. Ambas piernas.":"OJOS ABIERTOS, punto fijo. Ambas piernas."};
}
function getCoopV(ab,act){
  const u6=(ab==="51_65"&&act==="sedentary")||ab==="66_75"||ab==="over75";
  return u6?{label:"Cooper 6 min marcha",dur:"6 minutos",mode:"Caminar rápido",warmup:"2 min marcha suave integrada",ph:"Ej: 570"}
           :{label:"Cooper 12 min",dur:"12 minutos",mode:"Correr / trotar",warmup:"5–7 min trote suave previo",ph:"Ej: 2200"};
}
function getDhV(ab,act){
  if(ab==="over75"||!TABLES.deadhang[ab])return{available:false,reason:"No recomendado para este perfil."};
  if(ab==="66_75"&&act==="sedentary")return{available:false,reason:"No recomendado para Senior sedentario."};
  const grip=(ab==="u35"||ab==="36_50")?"Pronado (overhand)":(ab==="51_65"&&act==="active")?"Pronado o mixto":"Supino (underhand)";
  return{available:true,grip,safetyBox:ab==="66_75"};
}
function getSrtV(ab,act){
  return{highRisk:ab==="over75"||(ab==="66_75"&&act==="sedentary"),moderate:ab==="66_75"&&act==="active"};
}

// ─── COMPUTED ────────────────────────────────────────────────────────────────
function getScores(){
  const{ageBand:ab,activity:act,gender:g,values:v,pushupsVariant:pv,skippedSrt,hangEnabled}=state;
  if(!ab||!act||!g)return{};
  const balV=getBalV(ab,act);
  const dhV=getDhV(ab,act);
  const activeKeys=hangEnabled&&dhV.available?[...BASE_KEYS,"deadhang"]:BASE_KEYS;
  const br=v.balance_r?scoreBalance(v.balance_r,ab,g,balV.eyesClosed):5;
  const bl=v.balance_l?scoreBalance(v.balance_l,ab,g,balV.eyesClosed):5;
  const balScore=(v.balance_r||v.balance_l)?Math.min(br,bl):0;
  const srtVal=deductSRT();
  return{
    grip:v.grip?scoreGrip(v.grip,ab,g):0,
    chair:v.chair?scoreChair(v.chair,ab,g):0,
    pushups:v.pushups?scorePushups(v.pushups,ab,g,pv||"full"):0,
    balance:balScore,
    srt:skippedSrt?0:(srtVal>0?scoreSRT(String(srtVal),ab):0),
    cooper:v.cooper?scoreCooper(v.cooper,ab,act,g):0,
    deadhang:v.deadhang?scoreDeadhang(v.deadhang,ab,g):0,
  };
}
function getActiveKeys(){
  const{hangEnabled,ageBand:ab,activity:act}=state;
  if(!ab||!act)return BASE_KEYS;
  const dhV=getDhV(ab,act);
  return hangEnabled&&dhV.available?[...BASE_KEYS,"deadhang"]:BASE_KEYS;
}
function deductSRT(){
  const{srtDown:d,srtUp:u}=state;
  const ded=s=>s.hand+s.knee+s.forearm+s.balance*0.5;
  return Math.max(0,10-ded(d)-ded(u));
}
function getBalAsym(){
  const{values:v}=state;
  if(!v.balance_r||!v.balance_l)return null;
  return(Math.abs(parseFloat(v.balance_r)-parseFloat(v.balance_l))/Math.max(parseFloat(v.balance_r),parseFloat(v.balance_l))*100).toFixed(0);
}
function getPct(){
  const scores=getScores();
  const keys=getActiveKeys();
  const{skippedSrt,values:v}=state;
  const scored=keys.filter(k=>!skippedSrt||(k!=="srt"))
    .filter(k=>k==="balance"?(v.balance_r||v.balance_l):(k==="srt"?deductSRT()>0||v.srt:v[k]));
  const total=scored.reduce((a,k)=>a+scores[k],0);
  const max=scored.length*5;
  return{pct:max>0?Math.round(total/max*100):0,total,max,scoredKeys:scored};
}

function el(tag,attrs={},children=[]){
  const e=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object"){Object.assign(e.style,v);}
    else if(k.startsWith("on")&&typeof v==="function"){e.addEventListener(k.slice(2).toLowerCase(),v);}
    else if(k==="className"){e.className=v;}
    else{e[k]=v;}
  });
  children.forEach(c=>{
    if(c===null||c===undefined)return;
    if(typeof c==="string"||typeof c==="number"){e.appendChild(document.createTextNode(String(c)));}
    else if(c instanceof Node){e.appendChild(c);}
  });
  return e;
}
function div(style={},children=[]){return el("div",{style},children);}
function span(style={},text){return el("span",{style},[text]);}
function btn(style={},text,onClick){return el("button",{style,onClick},[text]);}
function inp(style={},attrs={}){return el("input",{style,...attrs});}
function h(level,style={},text){return el("h"+level,{style},[text]);}
function p(style={},text){return el("p",{style},[text]);}

  return wrap;
}

// ─── HANG TIMER ──────────────────────────────────────────────────────────────
function hangTimerEl(t,score,lbl){
  const{hangRunning,hangElapsed,values:v}=state;
  const display=hangRunning?hangElapsed.toFixed(1):(v.deadhang||"0.0");

  const wrap=div({background:t.bgCard,border:"1px solid #5ad4c840",borderRadius:"14px",padding:"22px",marginBottom:"14px"});
  wrap.appendChild(div({fontSize:"9px",letterSpacing:"3px",color:t.textDim,marginBottom:"14px"},["CRONÓMETRO · DEAD HANG"]));
  const display2=div({textAlign:"center",marginBottom:"18px"});
  const num=div({fontFamily:"'Playfair Display',Georgia,serif",fontSize:"60px",color:hangRunning?t.text:(lbl?lbl.color:t.textDim),lineHeight:"1",transition:"color 0.3s"});
  num.textContent=display;
  display2.appendChild(num);
  display2.appendChild(div({fontFamily:"monospace",fontSize:"12px",color:t.textDim,marginTop:"4px"},["segundos"]));
  if(lbl&&!hangRunning)display2.appendChild(div({fontFamily:"monospace",fontSize:"11px",color:lbl.color,marginTop:"6px",letterSpacing:"1px"},[lbl.text.toUpperCase()]));
  wrap.appendChild(display2);

  const btnRow=div({display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px",marginBottom:"10px"});
  if(!hangRunning){
    const startB=btn({gridColumn:"1/3",background:"#5ad4c8",border:"none",borderRadius:"10px",padding:"14px",color:"#111827",fontSize:"13px",letterSpacing:"1px"},"▶ INICIAR",()=>{
      const timer=setInterval(()=>{
        state.hangElapsed=+(state.hangElapsed+0.1).toFixed(1);
        render();
      },100);
      setState({hangRunning:true,hangElapsed:0,hangTimer:timer,values:{...state.values,deadhang:""}});
    });
    startB.style.gridColumn="1/3";
    btnRow.appendChild(startB);
  } else {
    const stopB=btn({background:"#d45a5a",border:"none",borderRadius:"10px",padding:"14px",color:"#fff",fontSize:"13px",letterSpacing:"1px"},"■ PARAR",()=>{
      clearInterval(state.hangTimer);
      const val=state.hangElapsed.toFixed(1);
      setState({hangRunning:false,hangTimer:null,values:{...state.values,deadhang:val}});
    });
    stopB.style.gridColumn="1/3";
    btnRow.appendChild(stopB);
  }
  btnRow.appendChild(btn({background:t.bgInput,border:`1px solid ${t.border}`,borderRadius:"10px",padding:"14px",color:t.textDim,fontSize:"14px"},"↺",()=>{
    clearInterval(state.hangTimer);
    setState({hangRunning:false,hangElapsed:0,hangTimer:null,values:{...state.values,deadhang:""}});
  }));
  wrap.appendChild(btnRow);
  if(lbl&&!hangRunning)wrap.appendChild(scoreBars(score,lbl.color));
  wrap.appendChild(div({marginTop:"10px",fontSize:"9px",color:t.textMuted,textAlign:"center"},["START al colgarse · STOP al soltar la barra"]));
  return wrap;
}

// ─── SRT CALCULATOR ──────────────────────────────────────────────────────────
function srtCalcEl(t){
  const{srtDown:d,srtUp:u,ageBand:ab}=state;
  const deduct=s=>s.hand+s.knee+s.forearm+s.balance*0.5;
  const total=Math.max(0,10-deduct(d)-deduct(u));
  const thresh=TABLES.srt[ab];
  const s=thresh?calcScore(total,thresh):0;
  const lbl=s?getLabel(s):null;

  function updateSRT(phase,field,delta){
    const max=field==="balance"?1:3;
    const src=phase==="down"?{...d}:{...u};
    src[field]=Math.max(0,Math.min(max,src[field]+delta));
    if(phase==="down")setState({srtDown:src});
    else setState({srtUp:src});
  }

  const wrap=div({background:t.bgCard,border:"1px solid #b48ad440",borderRadius:"14px",padding:"18px",marginBottom:"14px"});
  const head=div({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"});
  const hL=div({});
  hL.appendChild(div({fontSize:"9px",letterSpacing:"3px",color:t.textDim},["CALCULADORA SRT"]));
  hL.appendChild(div({fontSize:"9px",color:"#e8a05a",marginTop:"3px"},["⚠ PIERNAS CRUZADAS obligatorio"]));
  head.appendChild(hL);
  const hR=div({textAlign:"right"});
  hR.appendChild(div({fontFamily:"'Playfair Display',Georgia,serif",fontSize:"42px",color:lbl?lbl.color:t.textDim,lineHeight:"1"},[total.toFixed(1)]));
  hR.appendChild(div({fontSize:"9px",color:lbl?lbl.color:t.textDim,letterSpacing:"1px"},[lbl?lbl.text.toUpperCase():"/ 10 PUNTOS"]));
  head.appendChild(hR);
  wrap.appendChild(head);

  const grid=div({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"});
  [{label:"⬇ AL BAJAR",phase:"down",state2:d,col:"#c8a45a"},{label:"⬆ AL SUBIR",phase:"up",state2:u,col:"#8ab4d4"}].forEach(({label,phase,state2,col})=>{
    const col2=div({background:t.bgInput,borderRadius:"10px",padding:"12px"});
    col2.appendChild(div({fontSize:"9px",letterSpacing:"2px",color:col,marginBottom:"8px"},[label]));
    [{field:"hand",label:"Mano/s",ded:"−1 c/u"},{field:"knee",label:"Rodilla/s",ded:"−1 c/u"},{field:"forearm",label:"Antebrazo/s",ded:"−1 c/u"},{field:"balance",label:"Pérdida equilibrio",ded:"−0.5"}].forEach(({field,label:rl,ded})=>{
      const row=div({display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 0",borderBottom:`1px solid ${t.border}`});
      const rL=div({});
      rL.appendChild(div({fontSize:"11px",color:t.text},[rl]));
      rL.appendChild(div({fontSize:"9px",color:t.textMuted},[ded]));
      row.appendChild(rL);
      const rR=div({display:"flex",alignItems:"center",gap:"7px"});
      rR.appendChild(btn({width:"26px",height:"26px",borderRadius:"7px",background:t.bgCard,border:`1px solid ${t.border}`,color:t.text,fontSize:"15px"},"−",()=>updateSRT(phase,field,-1)));
      rR.appendChild(div({fontFamily:"monospace",fontSize:"17px",color:state2[field]>0?"#d45a5a":t.textMuted,minWidth:"18px",textAlign:"center"},[String(state2[field])]));
      rR.appendChild(btn({width:"26px",height:"26px",borderRadius:"7px",background:t.bgCard,border:`1px solid ${t.border}`,color:t.text,fontSize:"15px"},"+",()=>updateSRT(phase,field,+1)));
      row.appendChild(rR);
      col2.appendChild(row);
    });
    col2.appendChild(div({marginTop:"7px",fontSize:"9px",color:t.textDim,textAlign:"right"},[`Penalización: `,span({color:"#d45a5a"},`−${deduct(state2).toFixed(1)}`)]));
    grid.appendChild(col2);
  });
  wrap.appendChild(grid);

  const footer=div({marginTop:"10px",background:t.bgInput,borderRadius:"8px",padding:"9px 14px",display:"flex",justifyContent:"space-between"});
  footer.appendChild(span({fontSize:"10px",color:t.textDim},`10 − ${(deduct(d)+deduct(u)).toFixed(1)} penalización`));
  footer.appendChild(span({fontSize:"12px",color:lbl?lbl.color:t.accent},`= ${total.toFixed(1)} puntos`));
  wrap.appendChild(footer);
  if(lbl)wrap.appendChild(div({marginTop:"8px"},[scoreBars(s,lbl.color)]));
  return wrap;
}

// ─── FIELD + SLABEL + CHOICECARD HELPERS ─────────────────────────────────────
function fieldEl(t,label,value,placeholder,type,onChange){
  const wrap=div({});
  const lbl=div({fontSize:"9px",letterSpacing:"3px",color:t.textDim,marginBottom:"8px"},[label.toUpperCase()]);
  wrap.appendChild(lbl);
  const input=inp({width:"100%",background:t.bgInput,border:`1px solid ${t.border}`,borderRadius:"9px",padding:"10px 14px",color:t.text,fontSize:"13px",boxSizing:"border-box"},{type,value,placeholder});
  input.addEventListener("input",e=>onChange(e.target.value));
  wrap.appendChild(input);
  return wrap;
}
function sLabelEl(t,text){
  return div({fontSize:"9px",letterSpacing:"3px",color:t.textDim,marginBottom:"8px"},[text.toUpperCase()]);
}
function choiceCardEl(t,icon,title,desc,color,active,onClick){
  const c=div({background:active?color+"1a":t.bgInput,border:`1px solid ${active?color:t.border}`,borderRadius:"11px",padding:"14px 16px",cursor:"pointer",transition:"all 0.15s"});
  c.appendChild(div({fontSize:"22px",marginBottom:"6px"},[icon]));
  c.appendChild(div({fontSize:"13px",color:active?color:t.text,marginBottom:"3px"},[title]));
  if(desc)c.appendChild(div({fontSize:"10px",color:t.textDim,lineHeight:"1.5"},[desc]));
  c.addEventListener("click",onClick);
  return c;
}

// ─── LOGIN SCREEN ────────────────────────────────────────────────────────────
function loginScreen(){
  const t=THEMES["slate"];
  const wrap=document.createElement("div");
  wrap.style.cssText="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#151c2c;";

  const card=document.createElement("div");
  card.style.cssText="max-width:360px;width:100%;background:#1e2535;border:1px solid #2d3748;border-radius:20px;padding:40px 32px;text-align:center;";

  // Logo / title
  const logo=document.createElement("div");
  logo.style.cssText="font-size:10px;letter-spacing:5px;color:#3dd6a3;margin-bottom:20px;font-family:monospace;";
  logo.textContent="ACCESO PROFESIONAL";
  card.appendChild(logo);

  const h1=document.createElement("h1");
  h1.style.cssText="font-family:'Playfair Display',Georgia,serif;font-size:28px;font-weight:400;color:#e2e8f0;margin-bottom:8px;line-height:1.2;";
  h1.innerHTML='Evaluación Física<br><em style="color:#3dd6a3">Funcional</em>';
  card.appendChild(h1);

  const sub=document.createElement("p");
  sub.style.cssText="font-size:11px;color:#718096;margin-bottom:32px;font-family:monospace;";
  sub.textContent="Introduce la contraseña para acceder";
  card.appendChild(sub);

  // Input
  const inp2=document.createElement("input");
  inp2.type="password";
  inp2.placeholder="Contraseña";
  inp2.value=state.loginInput||"";
  inp2.style.cssText="width:100%;background:#111827;border:1px solid "+(state.loginError?"#d45a5a":"#2d3748")+";border-radius:12px;padding:16px;color:#e2e8f0;font-size:20px;font-family:monospace;text-align:center;margin-bottom:12px;box-sizing:border-box;letter-spacing:8px;outline:none;";
  inp2.addEventListener("input",e=>{state.loginInput=e.target.value;state.loginError=false;render();});
  inp2.addEventListener("keydown",e=>{if(e.key==="Enter")tryLogin();});
  card.appendChild(inp2);

  // Error msg
  if(state.loginError){
    const err=document.createElement("div");
    err.style.cssText="font-size:11px;color:#d45a5a;margin-bottom:12px;font-family:monospace;";
    err.textContent="Contraseña incorrecta. Inténtalo de nuevo.";
    card.appendChild(err);
  }

  // Button
  const btn2=document.createElement("button");
  btn2.textContent="ENTRAR →";
  btn2.style.cssText="width:100%;background:#3dd6a3;color:#111827;border:none;border-radius:12px;padding:16px;font-size:13px;font-family:monospace;letter-spacing:2px;cursor:pointer;";
  btn2.addEventListener("click",tryLogin);
  card.appendChild(btn2);

  wrap.appendChild(card);
  return wrap;
}

function tryLogin(){
  if(state.loginInput===PWD){
    state.step="setup";
    state.loginError=false;
    render();
  } else {
    state.loginError=true;
    render();
    // Focus input after render
    setTimeout(()=>{const i=document.querySelector("input[type=password]");if(i){i.focus();i.select();}},50);
  }
}

// ─── PDF / PRINT ─────────────────────────────────────────────────────────────
function generatePDF(){
  const{name,age,ageBand,activity,gender,values:v,pushupsVariant:pvc,skippedSrt}=state;
  const bandInfo=AGE_BANDS.find(b=>b.id===ageBand);
  const scores=getScores();
  const activeKeys=getActiveKeys();
  const{pct,total,max,scoredKeys}=getPct();
  const totLbl=getTotalLabel(pct);
  const balAsym=getBalAsym();
  const date=new Date().toLocaleDateString("es-ES",{day:"2-digit",month:"long",year:"numeric"});

  const baseCompleted=scoredKeys.filter(k=>k!=="deadhang").length;
  const rel=baseCompleted>=4?"Resultado válido":baseCompleted===3?"Resultado parcial":"Resultado no representativo";

  let rows="";
  activeKeys.forEach(k=>{
    const pres=PRESCRIPTIONS[k];
    const done=skippedSrt&&k==="srt"?true:(k==="balance"?(v.balance_r||v.balance_l):(k==="srt"?deductSRT()>0:v[k]));
    if(!done){rows+=`<tr><td>${pres.icon} ${TEST_LABELS[k]}</td><td colspan="3" style="color:#999;">Sin datos</td></tr>`;return;}
    if(skippedSrt&&k==="srt"){rows+=`<tr><td>${pres.icon} ${TEST_LABELS[k]}</td><td colspan="3" style="color:#e8a05a;">Limitación funcional registrada</td></tr>`;return;}
    const s=scores[k];
    const lbl=getLabel(s);
    let val="";
    if(k==="balance")val=`D:${v.balance_r||"—"}s / I:${v.balance_l||"—"}s${balAsym?` · Asimetría ${balAsym}%`:""}`;
    else if(k==="srt")val=`${deductSRT().toFixed(1)} puntos`;
    else if(k==="pushups")val=`${v[k]} rep${pvc?` (${pvc==="knees"?"rodillas":"plancha"})`:""}`;
    else if(k==="grip")val=`${v[k]} kg`;
    else if(k==="chair")val=`${v[k]} rep`;
    else if(k==="cooper")val=`${v[k]} metros`;
    else if(k==="deadhang")val=`${v[k]} seg`;
    const bars=`<span style="color:${lbl.color};">${"●".repeat(s)}${"○".repeat(5-s)}</span>`;
    rows+=`<tr><td>${pres.icon} ${TEST_LABELS[k]}</td><td style="color:${lbl.color};font-weight:bold;">${s}/5 ${lbl.text}</td><td>${val}</td><td>${bars}</td></tr>`;
  });

  // Priority list
  const priorityTests=activeKeys
    .filter(k=>!skippedSrt||(k!=="srt"))
    .filter(k=>k==="balance"?(v.balance_r||v.balance_l):(k==="srt"?deductSRT()>0:v[k]))
    .sort((a,b)=>scores[a]-scores[b]);
  const deficits=priorityTests.filter(k=>scores[k]<=2).map(k=>`${PRESCRIPTIONS[k].icon} ${TEST_LABELS[k]}`);
  const strong=priorityTests.filter(k=>scores[k]>=4).map(k=>`${PRESCRIPTIONS[k].icon} ${TEST_LABELS[k]}`);

  const html=`<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Evaluación — ${name||"Cliente"}</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:monospace;background:#f5f2ee;color:#1a1a1a;padding:32px;max-width:760px;margin:0 auto;}
.header{border-bottom:3px solid #3dd6a3;padding-bottom:20px;margin-bottom:24px;}
.brand{font-size:9px;letter-spacing:5px;color:#3dd6a3;margin-bottom:8px;}
h1{font-family:'Playfair Display',Georgia,serif;font-size:32px;font-weight:400;color:#1a1a1a;margin-bottom:4px;}
.meta{font-size:11px;color:#6a6050;margin-top:4px;}
.score-box{background:#1e2535;color:#e2e8f0;border-radius:12px;padding:20px 24px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;}
.score-pct{font-family:'Playfair Display',Georgia,serif;font-size:48px;line-height:1;}
.score-label{font-family:'Playfair Display',Georgia,serif;font-size:18px;margin-top:4px;}
.score-desc{font-size:11px;color:#718096;margin-top:4px;max-width:340px;}
.score-pts{text-align:right;}
.score-pts .num{font-family:'Playfair Display',Georgia,serif;font-size:32px;}
.score-pts .sub{font-size:10px;color:#718096;}
.reliability{font-size:10px;color:#4a5568;background:#e8e4dc;border-radius:8px;padding:8px 12px;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;margin-bottom:20px;}
th{text-align:left;font-size:9px;letter-spacing:2px;color:#6a6050;border-bottom:2px solid #ddd9d0;padding:8px 10px;}
td{padding:10px;border-bottom:1px solid #e8e4dc;font-size:12px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.section-title{font-size:9px;letter-spacing:3px;color:#4a7c6f;margin-bottom:10px;margin-top:20px;}
.diag{background:#fff;border-left:4px solid #3dd6a3;border-radius:0 8px 8px 0;padding:14px 16px;margin-bottom:20px;font-family:'Playfair Display',Georgia,serif;font-size:13px;font-style:italic;line-height:1.7;color:#1a1a1a;}
.pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.pill{background:#1e2535;color:#e2e8f0;border-radius:20px;padding:4px 12px;font-size:11px;}
.pill.red{background:#d45a5a20;color:#d45a5a;border:1px solid #d45a5a40;}
.pill.green{background:#5ab87a20;color:#2d8a52;border:1px solid #5ab87a40;}
.footer{margin-top:28px;border-top:1px solid #ddd9d0;padding-top:14px;font-size:9px;color:#b0a898;display:flex;justify-content:space-between;}
@media print{body{padding:0;}@page{margin:1.5cm;size:A4;}}
</style>
</head>
<body>
<div class="header">
  <div class="brand">EVALUACIÓN FÍSICA FUNCIONAL</div>
  <h1>${name||"Cliente"}</h1>
  <div class="meta">${age} años · ${bandInfo?.desc} (${bandInfo?.label}) · ${activity==="active"?"Activo":"Sedentario"} · ${gender==="m"?"Hombre":"Mujer"} · ${date}</div>
</div>

<div class="score-box">
  <div>
    <div class="score-pct" style="color:${totLbl.color};">${pct}%</div>
    <div class="score-label" style="color:${totLbl.color};">${totLbl.text}</div>
    <div class="score-desc">${totLbl.desc}</div>
  </div>
  <div class="score-pts">
    <div class="num">${total}</div>
    <div class="sub">de ${max} puntos</div>
    <div class="sub" style="margin-top:4px;">${rel}</div>
  </div>
</div>

${deficits.length>0||strong.length>0?`
<div class="section-title">RESUMEN</div>
${strong.length>0?`<p style="font-size:11px;color:#6a6050;margin-bottom:6px;">✅ Puntos fuertes:</p><div class="pills">${strong.map(s=>`<span class="pill green">${s}</span>`).join("")}</div>`:""}
${deficits.length>0?`<p style="font-size:11px;color:#6a6050;margin-bottom:6px;margin-top:8px;">⚠️ Prioridades de entrenamiento:</p><div class="pills">${deficits.map(d=>`<span class="pill red">${d}</span>`).join("")}</div>`:""}
`:""}

<div class="section-title" style="margin-top:20px;">RESULTADOS POR TEST</div>
<table>
  <thead><tr><th>TEST</th><th>PUNTUACIÓN</th><th>RESULTADO</th><th>NIVEL</th></tr></thead>
  <tbody>${rows}</tbody>
</table>

<div class="footer">
  <span>Evaluación Física Funcional · longevity-test.vercel.app</span>
  <span>${date}</span>
</div>
</body>
</html>`;

  // Open in new window and print
  const win=window.open("","_blank","width=800,height=900");
  win.document.write(html);
  win.document.close();
  win.onload=()=>{
    setTimeout(()=>{
      win.print();
    },500);
  };
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  if(state.step==="login"){
    document.body.style.background="#151c2c";
    document.body.style.color="#e2e8f0";
    app.appendChild(loginScreen());
    // Auto focus password input
    setTimeout(()=>{const i=document.querySelector("input[type=password]");if(i)i.focus();},50);
    return;
  }
  const t=T();
  document.body.style.background=t.bg;
  document.body.style.color=t.text;
  app.appendChild(themeSwitcher());
  if(state.step==="setup")app.appendChild(setupScreen());
  else if(state.step==="tests")app.appendChild(testsScreen());
  else if(state.step==="results")app.appendChild(resultsScreen());
}

render();
</script>
</body>
</html>
