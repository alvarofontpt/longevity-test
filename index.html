const BASE_KEYS=["grip","chair","pushups","balance","srt","cooper"];

// ═══════════════════════════════════════════════════════════
// SCORING
// ═══════════════════════════════════════════════════════════
function sc(v,t){if(v<t[0])return 1;if(v<t[1])return 2;if(v<t[2])return 3;if(v<t[3])return 4;return 5;}
function scGrip(v,ab,g){const t=TABLES.grip[ab]?.[g];return t?sc(parseFloat(v),t):0;}
function scChair(v,ab,g){const t=TABLES.chair[ab]?.[g];return t?sc(parseFloat(v),t):0;}
function scPush(v,ab,g,variant){const tbl=variant==="knees"?TABLES.pushups_knees:TABLES.pushups;const t=tbl[ab]?.[g];return t?sc(parseFloat(v),t):0;}
function scBal(v,ab,g,ec){if(!v)return 0;const fv=parseFloat(v);if(ec){const tbl=g==="m"?TABLES.balance_oc_m:TABLES.balance_oc_f;const t=tbl[ab];if(!t)return scBal(v,ab,g,false);return sc(fv,t);}const t=TABLES.balance_oa[ab];return t?sc(fv,t):0;}
function scSRT(v,ab){const t=TABLES.srt[ab];return t&&v?sc(parseFloat(v),t):0;}
function scCoop(v,ab,act,g,variant){if(!v)return 0;const fv=parseFloat(v);if(variant==="walk"){const t=TABLES.cooper6[ab]?.[g];return t?sc(fv,t):0;}const t=TABLES.cooper12[ab]?.[g];return t?sc(fv,t):0;}
function scHang(v,ab,g){if(!v||!TABLES.deadhang[ab])return 0;const t=TABLES.deadhang[ab]?.[g];return t?sc(parseFloat(v),t):0;}
function getLabel(s){
  if(s>=5)return{text:"Excelente",color:"#5ab87a"};
  if(s>=4)return{text:"Bueno",color:"#8ab4d4"};
  if(s>=3)return{text:"Normal",color:"#c8a45a"};
  if(s>=2)return{text:"Deficiente",color:"#e8a05a"};
  if(s>=1)return{text:"Muy deficiente",color:"#d45a5a"};
  return{text:"Sin datos",color:"#888"};
}
function getTotLabel(pct){
  if(pct>=90)return{text:"Rendimiento Elite",color:"#5ab87a",desc:"Condición física excepcional. Mantener y optimizar."};
  if(pct>=75)return{text:"Buen Estado",color:"#8ab4d4",desc:"Por encima de la media. Margen de mejora en áreas específicas."};
  if(pct>=55)return{text:"Estado Medio",color:"#c8a45a",desc:"Condición funcional aceptable con déficits a trabajar."};
  if(pct>=35)return{text:"Deficiente",color:"#e8a05a",desc:"Riesgo funcional moderado. Programa de mejora prioritario."};
  return{text:"Atención Prioritaria",color:"#d45a5a",desc:"Riesgo funcional elevado. Intervención inmediata recomendada."};
}

// ═══════════════════════════════════════════════════════════
// APP STATE — simple object, NO full re-render on input
// ═══════════════════════════════════════════════════════════
const S={
  screen:"login", // login | setup | tests | results
  loginErr:false,
  // setup
  name:"",age:"",ageBand:null,activity:null,gender:null,hangEnabled:false,
  // tests
  activeTest:"grip",
  // variants chosen by trainer
  pushupsVariant:null,   // 'full' | 'knees'
  balanceVariant:null,   // 'open' | 'closed'
  cooperVariant:null,    // 'run' | 'walk'
  dhVariant:null,        // grip type info (auto)
  skippedSrt:false,
  // values
  grip:"",chair:"",pushups:"",
  balR:"",balL:"",
  srtDown:{hand:0,knee:0,forearm:0,bal:0},
  srtUp:{hand:0,knee:0,forearm:0,bal:0},
  cooper:"",deadhang:"",
  // results
  activePres:null,
};

function activeKeys(){
  if(!S.ageBand||!S.activity)return BASE_KEYS;
  const dhOk=S.ageBand!=="over75"&&!(S.ageBand==="66_75"&&S.activity==="sedentary");
  return S.hangEnabled&&dhOk?[...BASE_KEYS,"deadhang"]:BASE_KEYS;
}
function srtTotal(){
  const d=S.srtDown,u=S.srtUp;
  const ded=x=>x.hand+x.knee+x.forearm+x.bal*0.5;
  return Math.max(0,10-ded(d)-ded(u));
}
function getScores(){
  const{ageBand:ab,activity:act,gender:g,pushupsVariant:pv,balanceVariant:bv,cooperVariant:cv}=S;
  if(!ab||!act||!g)return{};
  const ec=bv==="closed";
  const balScore=(S.balR||S.balL)?Math.min(
    S.balR?scBal(S.balR,ab,g,ec):5,
    S.balL?scBal(S.balL,ab,g,ec):5
  ):0;
  const srtVal=srtTotal();
  return{
    grip:S.grip?scGrip(S.grip,ab,g):0,
    chair:S.chair?scChair(S.chair,ab,g):0,
    pushups:S.pushups&&pv?scPush(S.pushups,ab,g,pv):0,
    balance:balScore,
    srt:S.skippedSrt?0:(srtVal>0?scSRT(String(srtVal),ab):0),
    cooper:S.cooper&&cv?scCoop(S.cooper,ab,act,g,cv):0,
    deadhang:S.deadhang?scHang(S.deadhang,ab,g):0,
  };
}
function getPct(){
  const scores=getScores();
  const keys=activeKeys();
  const scored=keys.filter(k=>{
    if(S.skippedSrt&&k==="srt")return false;
    if(k==="balance")return S.balR||S.balL;
    if(k==="srt")return srtTotal()>0;
    if(k==="pushups")return S.pushups&&S.pushupsVariant;
    if(k==="cooper")return S.cooper&&S.cooperVariant;
    return S[k];
  });
  const total=scored.reduce((a,k)=>a+(scores[k]||0),0);
  const max=scored.length*5;
  return{pct:max>0?Math.round(total/max*100):0,total,max,scored};
}
function getBalAsym(){
  if(!S.balR||!S.balL)return null;
  return(Math.abs(parseFloat(S.balR)-parseFloat(S.balL))/Math.max(parseFloat(S.balR),parseFloat(S.balL))*100).toFixed(0);
}
function getDhInfo(){
  const{ageBand:ab,activity:act}=S;
  if(!ab||!act)return{ok:false};
  if(ab==="over75"||!TABLES.deadhang[ab])return{ok:false,reason:"No recomendado para este perfil."};
  if(ab==="66_75"&&act==="sedentary")return{ok:false,reason:"No recomendado para Senior sedentario."};
  const grip=(ab==="u35"||ab==="36_50")?"Pronado (overhand)":(ab==="51_65"&&act==="active")?"Pronado o mixto":"Supino (underhand)";
  return{ok:true,grip,box:ab==="66_75"};
}

// ═══════════════════════════════════════════════════════════
// RENDER HELPERS — minimal DOM, no re-render on input
// ═══════════════════════════════════════════════════════════
function e(tag,attrs,kids){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="cls")el.className=v;
    else el[k]=v;
  });
  if(kids)kids.forEach(c=>{
    if(c==null)return;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  });
  return el;
}
function d(style,kids){return e("div",{style},kids);}
function t(style,text){return e("span",{style},[text]);}
function btn(style,text,onClick){return e("button",{style,onClick},[text]);}
function lbl(text,t_){return e("div",{style:{fontSize:"9px",letterSpacing:"3px",color:t_.textDim,marginBottom:"8px"}},[text.toUpperCase()]);}
function bars(score,color,t_){
  const w=d({display:"flex",gap:"4px",marginTop:"6px"});
  for(let i=1;i<=5;i++)w.appendChild(d({flex:"1",height:"4px",borderRadius:"2px",background:i<=score?color:t_.border}));
  return w;
}

// ═══════════════════════════════════════════════════════════
// THEME SWITCHER
// ═══════════════════════════════════════════════════════════
function themeSwitcher(){
  const t_=T();
  const dots=[{k:"dark",bg:"#0c0c10",ring:"#c8a45a"},{k:"slate",bg:"#1e2535",ring:"#3dd6a3"},{k:"light",bg:"#f5f2ee",ring:"#4a7c6f"}];
  const w=d({position:"fixed",top:"12px",right:"14px",display:"flex",gap:"8px",zIndex:"1000",alignItems:"center",background:t_.bgCard+"dd",borderRadius:"20px",padding:"5px 10px",border:`1px solid ${t_.border}`});
  dots.forEach(dot=>{
    const el=d({width:"16px",height:"16px",borderRadius:"50%",background:dot.bg,border:`2px solid ${TK===dot.k?dot.ring:t_.border}`,cursor:"pointer",transition:"all 0.2s",transform:TK===dot.k?"scale(1.3)":"scale(1)"});
    el.addEventListener("click",()=>{TK=dot.k;render();});
    w.appendChild(el);
  });
  return w;
}

// ═══════════════════════════════════════════════════════════
// LOGIN SCREEN
// ═══════════════════════════════════════════════════════════
function loginScreen(){
  const wrap=d({minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px",background:"#151c2c"});
  const card=d({maxWidth:"340px",width:"100%",background:"#1e2535",border:"1px solid #2d3748",borderRadius:"20px",padding:"36px 28px",textAlign:"center"});
  card.appendChild(d({fontSize:"10px",letterSpacing:"5px",color:"#3dd6a3",marginBottom:"16px"},["ACCESO PROFESIONAL"]));
  const h1=e("h1",{style:{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"26px",fontWeight:"400",color:"#e2e8f0",marginBottom:"6px"}});
  h1.innerHTML='Evaluación Física<br><em style="color:#3dd6a3">Funcional</em>';
  card.appendChild(h1);
  card.appendChild(d({fontSize:"11px",color:"#718096",marginBottom:"28px"},["Introduce la contraseña para acceder"]));

  const inp=e("input",{type:"password",placeholder:"Contraseña",style:{width:"100%",background:"#111827",border:`1px solid ${S.loginErr?"#d45a5a":"#2d3748"}`,borderRadius:"12px",padding:"14px",color:"#e2e8f0",fontSize:"22px",textAlign:"center",letterSpacing:"8px",marginBottom:"10px",boxSizing:"border-box"}});

  if(S.loginErr){card.appendChild(d({fontSize:"11px",color:"#d45a5a",marginBottom:"10px"},["Contraseña incorrecta."]));}

  function tryLogin(){
    if(inp.value===PWD){S.screen="setup";S.loginErr=false;render();}
    else{S.loginErr=true;render();setTimeout(()=>{const i=document.querySelector("input[type=password]");if(i){i.focus();}},50);}
  }
  inp.addEventListener("keydown",ev=>{if(ev.key==="Enter")tryLogin();});
  card.appendChild(inp);
  card.appendChild(btn({width:"100%",background:"#3dd6a3",color:"#111827",border:"none",borderRadius:"12px",padding:"14px",fontSize:"13px",letterSpacing:"2px"},"ENTRAR →",tryLogin));
  wrap.appendChild(card);
  setTimeout(()=>{const i=document.querySelector("input[type=password]");if(i)i.focus();},50);
  return wrap;
}

// ═══════════════════════════════════════════════════════════
// SETUP SCREEN
// ═══════════════════════════════════════════════════════════
function setupScreen(){
  const t_=T();
  const dh=getDhInfo();
  const canStart=S.ageBand&&S.activity&&S.gender;

  const wrap=d({minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px"});
  const inner=d({maxWidth:"540px",width:"100%"});

  // Header
  const hdr=d({textAlign:"center",marginBottom:"36px"});
  hdr.appendChild(d({fontSize:"10px",letterSpacing:"5px",color:t_.accent,marginBottom:"12px"},["EVALUACIÓN FÍSICA FUNCIONAL"]));
  const h1=e("h1",{style:{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"38px",fontWeight:"400",color:t_.text,lineHeight:"1.15",marginBottom:"8px"}});
  h1.innerHTML=`Test de<br><em style="color:${t_.accent}">Condición Física</em>`;
  hdr.appendChild(h1);
  inner.appendChild(hdr);

  const card=d({background:t_.bgCard,border:`1px solid ${t_.border}`,borderRadius:"20px",padding:"28px"});

  // Name + Age — NO re-render on input, just update S
  const row1=d({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"20px"});
  const nameField=d({});
  nameField.appendChild(lbl("Nombre del cliente",t_));
  const nameInp=e("input",{type:"text",placeholder:"Ana García...",value:S.name,style:{width:"100%",background:t_.bgInput,border:`1px solid ${t_.border}`,borderRadius:"9px",padding:"10px 14px",color:t_.text,fontSize:"13px",boxSizing:"border-box"}});
  nameInp.addEventListener("input",ev=>{S.name=ev.target.value;});
  nameField.appendChild(nameInp);
  row1.appendChild(nameField);

  const ageField=d({});
  ageField.appendChild(lbl("Edad",t_));
  const ageInp=e("input",{type:"number",placeholder:"48",value:S.age,style:{width:"100%",background:t_.bgInput,border:`1px solid ${t_.border}`,borderRadius:"9px",padding:"10px 14px",color:t_.text,fontSize:"13px",boxSizing:"border-box"}});
  ageInp.addEventListener("input",ev=>{
    S.age=ev.target.value;
    const n=parseInt(ev.target.value);
    if(!isNaN(n)){
      S.ageBand=n<=35?"u35":n<=50?"36_50":n<=65?"51_65":n<=75?"66_75":"over75";
      // Update band display without full render
      updateBandDisplay();
    }
  });
  ageField.appendChild(ageInp);
  row1.appendChild(ageField);
  card.appendChild(row1);

  // Age bands
  const ageSec=d({marginBottom:"20px"});
  ageSec.appendChild(lbl("Franja de edad",t_));
  const bandGrid=d({display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"6px"});
  AGE_BANDS.forEach(b=>{
    const active=S.ageBand===b.id;
    const bd=d({background:active?b.color+"22":t_.bgInput,border:`1px solid ${active?b.color:t_.border}`,borderRadius:"10px",padding:"8px 2px",textAlign:"center",cursor:"pointer"});
    bd.appendChild(d({fontSize:"11px",color:active?b.color:t_.text},[b.label]));
    bd.appendChild(d({fontSize:"8px",color:t_.textDim,marginTop:"2px"},[b.desc]));
    bd.addEventListener("click",()=>{S.ageBand=b.id;render();});
    bandGrid.appendChild(bd);
  });
  ageSec.appendChild(bandGrid);
  const bandMsg=d({marginTop:"6px",fontSize:"10px",color:S.ageBand?AGE_BANDS.find(b=>b.id===S.ageBand)?.color:"transparent"});
  bandMsg.id="band-msg";
  if(S.age&&S.ageBand){const b=AGE_BANDS.find(x=>x.id===S.ageBand);bandMsg.textContent=`✓ ${S.age} años → ${b.desc} (${b.label})`;}
  ageSec.appendChild(bandMsg);
  card.appendChild(ageSec);

  function updateBandDisplay(){
    const msg=document.getElementById("band-msg");
    if(msg&&S.ageBand){const b=AGE_BANDS.find(x=>x.id===S.ageBand);msg.style.color=b.color;msg.textContent=`✓ ${S.age} años → ${b.desc} (${b.label})`;}
  }

  // Activity
  const actSec=d({marginBottom:"20px"});
  actSec.appendChild(lbl("Nivel de actividad",t_));
  const actGrid=d({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"});
  [{k:"active",icon:"🏃",title:"Activo",desc:"Entrena ≥2×/semana",color:"#c8a45a"},{k:"sedentary",icon:"🛋️",title:"Sedentario",desc:"Sin actividad regular",color:"#8ab4d4"}].forEach(o=>{
    const active=S.activity===o.k;
    const c=d({background:active?o.color+"1a":t_.bgInput,border:`1px solid ${active?o.color:t_.border}`,borderRadius:"11px",padding:"12px",cursor:"pointer"});
    c.appendChild(d({fontSize:"20px",marginBottom:"4px"},[o.icon]));
    c.appendChild(d({fontSize:"12px",color:active?o.color:t_.text,marginBottom:"2px"},[o.title]));
    c.appendChild(d({fontSize:"9px",color:t_.textDim},[o.desc]));
    c.addEventListener("click",()=>{S.activity=o.k;render();});
    actGrid.appendChild(c);
  });
  actSec.appendChild(actGrid);
  actSec.appendChild(d({marginTop:"8px",fontSize:"9px",color:t_.textMuted,padding:"6px 10px",background:t_.bgInput,borderRadius:"8px"},["ℹ El nivel de actividad determina el protocolo, no el baremo de puntuación."]));
  card.appendChild(actSec);

  // Gender
  const genSec=d({marginBottom:"18px"});
  genSec.appendChild(lbl("Sexo biológico",t_));
  const genGrid=d({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"});
  [{k:"m",icon:"♂",title:"Hombre",color:"#5ab87a"},{k:"f",icon:"♀",title:"Mujer",color:"#d45a5a"}].forEach(o=>{
    const active=S.gender===o.k;
    const c=d({background:active?o.color+"1a":t_.bgInput,border:`1px solid ${active?o.color:t_.border}`,borderRadius:"11px",padding:"12px",cursor:"pointer",textAlign:"center"});
    c.appendChild(d({fontSize:"22px",marginBottom:"4px"},[o.icon]));
    c.appendChild(d({fontSize:"13px",color:active?o.color:t_.text},[o.title]));
    c.addEventListener("click",()=>{S.gender=o.k;render();});
    genGrid.appendChild(c);
  });
  genSec.appendChild(genGrid);
  card.appendChild(genSec);

  // Dead hang toggle
  const dhSec=d({marginBottom:"20px",background:t_.bgInput,border:`1px solid ${t_.border}`,borderRadius:"12px",padding:"14px"});
  const dhRow=d({display:"flex",justifyContent:"space-between",alignItems:"center"});
  const dhL=d({});
  dhL.appendChild(d({fontSize:"12px",color:"#5ad4c8"},["🏋️ Añadir Dead Hang"]));
  dhL.appendChild(d({fontSize:"9px",color:t_.textDim,marginTop:"2px"},["Test 7 opcional · Requiere barra"]));
  dhRow.appendChild(dhL);
  const tog=d({width:"42px",height:"22px",borderRadius:"11px",background:S.hangEnabled?"#5ad4c8":t_.border,cursor:"pointer",position:"relative",transition:"all 0.2s",flexShrink:"0"});
  const knob=d({position:"absolute",top:"3px",left:S.hangEnabled?"21px":"3px",width:"16px",height:"16px",borderRadius:"50%",background:S.hangEnabled?t_.bg:t_.textDim,transition:"all 0.2s"});
  tog.appendChild(knob);
  tog.addEventListener("click",()=>{S.hangEnabled=!S.hangEnabled;render();});
  dhRow.appendChild(tog);
  dhSec.appendChild(dhRow);
  if(S.hangEnabled&&S.ageBand&&S.activity){
    const info=getDhInfo();
    if(!info.ok)dhSec.appendChild(d({marginTop:"8px",fontSize:"10px",color:"#e8a05a",background:"#e8a05a15",borderRadius:"8px",padding:"7px 10px"},[`⚠ ${info.reason}`]));
    else dhSec.appendChild(d({marginTop:"6px",fontSize:"10px",color:"#5ad4c8"},[`Agarre: ${info.grip}${info.box?" · ⚠ Cajón de seguridad debajo":""}`]));
  }
  card.appendChild(dhSec);

  // Start
  const startB=btn({width:"100%",background:canStart?t_.btn:t_.bgInput,color:canStart?t_.btnText:t_.textMuted,border:"none",borderRadius:"12px",padding:"14px",fontSize:"13px",letterSpacing:"2px"},
    "COMENZAR EVALUACIÓN →",()=>{if(canStart){S.screen="tests";S.activeTest="grip";render();}});
  card.appendChild(startB);
  inner.appendChild(card);
  wrap.appendChild(inner);
  return wrap;
}

// ═══════════════════════════════════════════════════════════
// TESTS SCREEN
// ═══════════════════════════════════════════════════════════
function testsScreen(){
  const t_=T();
  const{ageBand:ab,activity:act,gender:g,activeTest:at,pushupsVariant:pv,balanceVariant:bv,cooperVariant:cv,skippedSrt}=S;
  const band=AGE_BANDS.find(b=>b.id===ab);
  const scores=getScores();
  const keys=activeKeys();
  const atIdx=keys.indexOf(at);
  const pres=PRES[at];
  const impact=HEALTH[at];
  const{pct,scored}=getPct();

  // Filled count
  const filled=keys.filter(k=>{
    if(skippedSrt&&k==="srt")return true;
    if(k==="balance")return S.balR||S.balL;
    if(k==="srt")return srtTotal()>0;
    if(k==="pushups")return S.pushups&&pv;
    if(k==="cooper")return S.cooper&&cv;
    return S[k];
  });

  const wrap=d({});
  const layout=e("div",{cls:"test-layout"});

  // ── SIDEBAR ──
  const sidebar=e("div",{cls:"sidebar",style:{borderRight:`1px solid ${t_.border}`,display:"flex",flexDirection:"column",background:t_.bgCard}});

  const sHead=e("div",{cls:"sidebar-head",style:{padding:"16px 16px",borderBottom:`1px solid ${t_.border}`}});
  sHead.appendChild(d({fontSize:"9px",letterSpacing:"3px",color:t_.accent,marginBottom:"4px"},["CLIENTE"]));
  sHead.appendChild(d({fontSize:"13px",fontFamily:"'Playfair Display',Georgia,serif",color:t_.text},[S.name||"Sin nombre"]));
  sHead.appendChild(d({fontSize:"9px",color:t_.textDim,marginTop:"3px",lineHeight:"1.6"},[`${S.age} años · ${band?.desc} · ${act==="active"?"Activo":"Sedentario"} · ${g==="m"?"H":"M"}`]));
  sidebar.appendChild(sHead);

  const sNav=e("div",{cls:"sidebar-nav",style:{flex:"1",paddingTop:"4px",overflowY:"auto"}});
  keys.forEach(k=>{
    const isH=k==="deadhang";
    const done=skippedSrt&&k==="srt"?true:(k==="balance"?(S.balR||S.balL):(k==="srt"?srtTotal()>0:(k==="pushups"?S.pushups&&pv:(k==="cooper"?S.cooper&&cv:S[k]))));
    const s=done&&!(skippedSrt&&k==="srt")?scores[k]:null;
    const lbl2=s?getLabel(s):null;
    const isActive=at===k;
    const item=e("div",{cls:`sidebar-nav-item${isActive?" active":""}`,style:{padding:"9px 16px",cursor:"pointer",background:isActive?t_.accentBg:"transparent",borderLeft:`3px solid ${isActive?(isH?"#5ad4c8":t_.accent):"transparent"}`,transition:"all 0.15s"}});
    const iRow=d({display:"flex",justifyContent:"space-between",alignItems:"center"});
    iRow.appendChild(d({fontSize:"11px",color:isActive?t_.text:t_.textDim},[(isH?"★ ":"")+TEST_LABELS[k]]));
    if(skippedSrt&&k==="srt")iRow.appendChild(d({fontSize:"8px",color:"#e8a05a"},["OMITIDO"]));
    else if(lbl2)iRow.appendChild(d({fontSize:"16px",fontWeight:"600",color:lbl2.color},[String(s)]));
    else iRow.appendChild(d({width:"6px",height:"6px",borderRadius:"50%",background:t_.border}));
    item.appendChild(iRow);
    if(lbl2&&!(skippedSrt&&k==="srt"))item.appendChild(d({fontSize:"8px",color:lbl2.color,letterSpacing:"1px",marginTop:"1px"},[lbl2.text.toUpperCase()]));
    item.addEventListener("click",()=>{S.activeTest=k;render();});
    sNav.appendChild(item);
  });
  sidebar.appendChild(sNav);

  const sFoot=e("div",{cls:"sidebar-foot",style:{padding:"12px 16px",borderTop:`1px solid ${t_.border}`}});
  sFoot.appendChild(d({fontSize:"9px",color:t_.textMuted,marginBottom:"2px"},["COMPLETADOS"]));
  const sNum=d({fontFamily:"'Playfair Display',Georgia,serif",fontSize:"22px",color:t_.accent});
  sNum.innerHTML=`${filled.length}<span style="font-size:11px;color:${t_.textDim}">/${keys.length}</span>`;
  sFoot.appendChild(sNum);
  if(filled.length>0)sFoot.appendChild(d({fontSize:"9px",color:t_.textDim,marginTop:"1px"},[`Parcial: ${pct}%`]));
  sidebar.appendChild(sFoot);
  layout.appendChild(sidebar);

  // ── MAIN ──
  const main=d({overflowY:"auto",background:t_.bg});
  const inner=e("div",{cls:"main-inner",style:{maxWidth:"600px",padding:"28px 32px"}});

  // Header
  const mHead=d({display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"16px"});
  const mHL=d({});
  mHL.appendChild(d({fontSize:"9px",letterSpacing:"3px",color:pres.color,marginBottom:"6px"},[at==="deadhang"?"TEST OPCIONAL":`TEST ${atIdx+1} DE ${BASE_KEYS.length}`]));
  mHL.appendChild(e("h2",{style:{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"26px",fontWeight:"400",color:t_.text,marginBottom:"3px"}},[`${pres.icon} ${TEST_LABELS[at]}`]));

  // Variant label
  let variantLabel="";
  if(at==="pushups"&&pv)variantLabel=pv==="knees"?"🦵 Desde rodillas":"💪 Plancha completa";
  if(at==="balance"&&bv)variantLabel=bv==="closed"?"👁 Ojos cerrados":"👁 Ojos abiertos";
  if(at==="cooper"&&cv)variantLabel=cv==="walk"?"🚶 Caminando (6 min)":"🏃 Corriendo (12 min)";
  if(at==="deadhang"){const dhi=getDhInfo();if(dhi.ok)variantLabel=`Agarre: ${dhi.grip}`;}
  if(variantLabel)mHL.appendChild(d({fontSize:"10px",color:t_.textDim},[variantLabel]));
  mHead.appendChild(mHL);

  const sc2=scores[at]||(at==="balance"?scores.balance:0);
  if(sc2>0){
    const lbl2=getLabel(sc2);
    const mHR=d({textAlign:"right",flexShrink:"0"});
    mHR.appendChild(d({fontFamily:"'Playfair Display',Georgia,serif",fontSize:"46px",color:lbl2.color,lineHeight:"1"},[String(sc2)]));
    mHR.appendChild(d({fontSize:"9px",color:lbl2.color,letterSpacing:"1px"},[lbl2.text.toUpperCase()]));
    mHead.appendChild(mHR);
  }
  inner.appendChild(mHead);

  // Health impact
  const imp=d({background:t_.accentBg,border:`1px solid ${t_.accentBorder}`,borderRadius:"12px",padding:"12px 14px",marginBottom:"14px",display:"flex",gap:"10px",alignItems:"flex-start"});
  imp.appendChild(d({fontSize:"16px",flexShrink:"0"},[impact.icon]));
  const impT=d({});
  impT.appendChild(d({fontSize:"11px",color:t_.text,lineHeight:"1.6",marginBottom:"2px"},[impact.text]));
  impT.appendChild(d({fontSize:"9px",color:t_.textDim},[impact.src]));
  imp.appendChild(impT);
  inner.appendChild(imp);

  // ── VARIANT SELECTORS ──
  // Pushups
  if(at==="pushups"){
    inner.appendChild(variantSelector(t_,"¿Variante de flexiones?",
      [{k:"full",icon:"💪",title:"Plancha completa",desc:"Cuerpo recto de cabeza a talones",color:"#d45a5a"},
       {k:"knees",icon:"🦵",title:"Desde rodillas",desc:"Alineado de rodillas a hombros",color:"#8ab4d4"}],
      pv,v=>{S.pushupsVariant=v;render();}));
  }

  // Balance
  if(at==="balance"){
    inner.appendChild(variantSelector(t_,"¿Ojos abiertos o cerrados?",
      [{k:"open",icon:"👁",title:"Ojos abiertos",desc:"Punto fijo. Cerca de pared si senior.",color:"#8ab4d4"},
       {k:"closed",icon:"🚫",title:"Ojos cerrados",desc:"Mayor dificultad propioceptiva.",color:"#5ab87a"}],
      bv,v=>{S.balanceVariant=v;render();}));
  }

  // Cooper
  if(at==="cooper"){
    inner.appendChild(variantSelector(t_,"¿Cómo realiza el test?",
      [{k:"run",icon:"🏃",title:"Corriendo / trotando",desc:"12 minutos. Perfil activo.",color:"#c8a45a"},
       {k:"walk",icon:"🚶",title:"Caminando",desc:"6 minutos. Perfil senior/sedentario.",color:"#8ab4d4"}],
      cv,v=>{S.cooperVariant=v;render();}));
  }

  // ── SRT SKIP WARNING ──
  if(at==="srt"){
    const highRisk=ab==="over75"||(ab==="66_75"&&act==="sedentary");
    const moderate=ab==="66_75"&&act==="active";
    if(highRisk||moderate){
      const warn=d({background:"#e8a05a15",border:"1px solid #e8a05a40",borderRadius:"12px",padding:"12px 14px",marginBottom:"12px"});
      warn.appendChild(d({fontSize:"10px",color:"#e8a05a",marginBottom:"8px"},[highRisk?"⚠ Perfil de riesgo elevado para bajar al suelo.":"⚠ Realizar con colchoneta y asistente cerca."]));
      if(!skippedSrt){
        warn.appendChild(btn({background:"transparent",border:"1px solid #e8a05a",borderRadius:"8px",padding:"6px 12px",color:"#e8a05a",fontSize:"10px"},
          "Marcar como no realizable",()=>{S.skippedSrt=true;render();}));
      } else {
        const uRow=d({display:"flex",alignItems:"center",gap:"10px"});
        uRow.appendChild(d({fontSize:"10px",color:"#e8a05a"},["✓ Limitación funcional registrada"]));
        uRow.appendChild(btn({background:"transparent",border:`1px solid ${t_.border}`,borderRadius:"8px",padding:"4px 8px",color:t_.textDim,fontSize:"9px"},"Deshacer",()=>{S.skippedSrt=false;render();}));
        warn.appendChild(uRow);
      }
      inner.appendChild(warn);
    }
  }

  // ── PROTOCOL ──
  if(!skippedSrt||at!=="srt"){
    const proto=d({background:t_.bgCard,border:`1px solid ${t_.border}`,borderRadius:"14px",padding:"16px",marginBottom:"14px"});
    proto.appendChild(d({fontSize:"9px",letterSpacing:"3px",color:t_.textDim,marginBottom:"8px"},["PROTOCOLO"]));

    // Chair stand special grid
    if(at==="chair"){
      const cg=d({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px",marginBottom:"10px"});
      [["ALTURA SILLA","43–45 cm · Sin brazos"],["POSTURA","Espalda recta"],["BRAZOS","Cruzados sobre pecho"],["REP VÁLIDA","Extensión completa · Sin rebotar"]].forEach(([k,v])=>{
        const cd=d({background:t_.bgInput,borderRadius:"8px",padding:"7px 9px"});
        cd.appendChild(d({fontSize:"8px",color:t_.textMuted,marginBottom:"2px"},[k]));
        cd.appendChild(d({fontSize:"10px",color:t_.text},[v]));
        cg.appendChild(cd);
      });
      proto.appendChild(cg);
    }
    if(at==="grip")proto.appendChild(d({background:t_.bgInput,borderRadius:"8px",padding:"8px 10px",marginBottom:"8px",fontSize:"10px",color:"#e8a05a"},["⚠ Verificar que el dinamómetro esté en KG, no en lbs. Si muestra libras: ÷ 2.205"]));

    let note="";
    if(at==="grip")note="Mano dominante. 3 intentos, mejor marca. Brazo extendido. Apretar al máximo 3–5 seg.";
    else if(at==="chair")note="Levantarse y sentarse completamente en 30 segundos. Sin apoyo de manos.";
    else if(at==="pushups")note=pv==="knees"?"Rodillas en suelo, cuerpo alineado. Pecho roza suelo. Hasta el fallo técnico.":pv==="full"?"Plancha completa. Cuerpo recto. Pecho toca suelo. Hasta el fallo técnico.":"Selecciona la variante arriba.";
    else if(at==="balance")note=bv==="closed"?"OJOS CERRADOS. Registrar AMBAS piernas por separado. Puntúa la peor.":bv==="open"?"OJOS ABIERTOS, punto fijo. AMBAS piernas por separado. Puntúa la peor.":"Selecciona la variante arriba.";
    else if(at==="srt")note="PIERNAS CRUZADAS obligatorio. Sentarse y levantarse sin apoyos. −1 por apoyo, −0.5 por pérdida de equilibrio.";
    else if(at==="cooper")note=cv==="run"?"Correr / trotar durante 12 minutos. Medir metros totales.":cv==="walk"?"Caminar rápido durante 6 minutos. Medir metros totales.":"Selecciona la variante arriba.";
    else if(at==="deadhang"){const dhi=getDhInfo();note=dhi.ok?`Agarre ${dhi.grip}. Cuerpo estático sin balanceo. Mide el tiempo con cronómetro físico o Apple Watch.`:"No recomendado para este perfil.";}

    proto.appendChild(d({fontSize:"11px",color:t_.text,lineHeight:"1.7",marginBottom:at==="cooper"?"8px":"0"},[note]));
    if(at==="cooper"&&cv)proto.appendChild(d({background:t_.bgInput,borderRadius:"8px",padding:"7px 10px",fontSize:"10px",color:t_.textDim},[cv==="run"?"Calentamiento: 5–7 min trote suave previo":"Calentamiento: 2 min marcha suave integrada al inicio"]));
    if(at==="deadhang"&&getDhInfo().box)proto.appendChild(d({background:"#e8a05a15",border:"1px solid #e8a05a30",borderRadius:"8px",padding:"7px 10px",fontSize:"10px",color:"#e8a05a",marginTop:"8px"},["⚠ Cajón o banco debajo para descenso seguro"]));
    if(at==="deadhang")proto.appendChild(d({marginTop:"8px",fontSize:"9px",color:t_.textMuted,padding:"5px 8px",background:t_.bgInput,borderRadius:"6px"},["ℹ Valores orientativos — sin normativa clínica poblacional establecida."]));
    if(at==="chair"&&(ab==="u35"||ab==="36_50"||ab==="51_65"))proto.appendChild(d({marginTop:"8px",fontSize:"9px",color:t_.textMuted,padding:"5px 8px",background:t_.bgInput,borderRadius:"6px"},["ℹ Baremos <60 años basados en extrapolación — sin estudio poblacional grande."]));
    inner.appendChild(proto);
  }

  // ── INPUT AREA ──
  if(!skippedSrt||at!=="srt"){
    if(at==="srt")inner.appendChild(srtCalc(t_,scores));
    else if(at==="balance")inner.appendChild(balanceInput(t_,scores));
    else if(at==="pushups"&&!pv||at==="cooper"&&!cv){
      inner.appendChild(d({background:t_.bgCard,border:`1px dashed ${t_.border}`,borderRadius:"14px",padding:"28px",marginBottom:"14px",textAlign:"center"},[
        d({fontSize:"22px",marginBottom:"8px"},["⬆"]),
        d({fontSize:"12px",color:t_.textDim},["Selecciona la variante para registrar el resultado"]),
      ]));
    } else {
      inner.appendChild(numInput(t_,at,pres,scores,cv));
    }
  }

  // ── NAV BUTTONS ──
  const navRow=d({display:"flex",gap:"10px",marginTop:"4px"});
  if(atIdx>0)navRow.appendChild(btn({flex:"1",background:"transparent",border:`1px solid ${t_.border}`,borderRadius:"10px",padding:"11px",color:t_.textDim,fontSize:"11px"},`← ${TEST_LABELS[keys[atIdx-1]]}`,()=>{S.activeTest=keys[atIdx-1];render();}));
  if(atIdx<keys.length-1){
    navRow.appendChild(btn({flex:"1",background:t_.accentBg,border:`1px solid ${t_.accentBorder}`,borderRadius:"10px",padding:"11px",color:t_.accent,fontSize:"11px"},`${TEST_LABELS[keys[atIdx+1]]} →`,()=>{S.activeTest=keys[atIdx+1];render();}));
  } else {
    navRow.appendChild(btn({flex:"1",background:t_.btn,border:"none",borderRadius:"10px",padding:"11px",color:t_.btnText,fontSize:"12px",letterSpacing:"2px"},"VER RESULTADOS →",()=>{S.screen="results";render();}));
  }
  inner.appendChild(navRow);
  if(filled.length>=3)inner.appendChild(btn({width:"100%",marginTop:"8px",background:"transparent",border:`1px solid ${t_.border}`,borderRadius:"10px",padding:"10px",color:t_.textDim,fontSize:"10px"},`Ver resultados parciales (${filled.length} completados)`,()=>{S.screen="results";render();}));

  main.appendChild(inner);
  layout.appendChild(main);
  wrap.appendChild(layout);
  return wrap;
}

// Numeric input — no re-render on keystroke
function numInput(t_,at,pres,scores,cv){
  const wrap=d({background:t_.bgCard,border:`1px solid ${pres.color}40`,borderRadius:"14px",padding:"18px",marginBottom:"14px"});
  wrap.appendChild(d({fontSize:"9px",letterSpacing:"3px",color:t_.textDim,marginBottom:"10px"},["RESULTADO"]));
  const row=d({display:"flex",gap:"12px",alignItems:"center"});
  const placeholder=at==="grip"?"Ej: 42.5":at==="chair"?"Ej: 14":at==="pushups"?"Ej: 18":at==="deadhang"?"Ej: 35":(cv==="walk"?"Ej: 570":"Ej: 2200");
  const unit=at==="grip"?"kg":at==="chair"||at==="pushups"?"rep":at==="deadhang"?"seg":"metros";
  const step=at==="grip"?"0.1":"1";
  const inp=e("input",{type:"number",placeholder,value:S[at]||"",step,style:{flex:"1",background:t_.bgInput,border:`1px solid ${pres.color}60`,borderRadius:"10px",padding:"13px 16px",color:t_.text,fontSize:"26px",textAlign:"center"}});
  // KEY: only update state, do NOT call render()
  inp.addEventListener("input",ev=>{S[at]=ev.target.value;updateScoreBars(at,pres,scores,t_,ev.target.value);});
  inp.addEventListener("blur",()=>render()); // re-render only on blur (when keyboard closes)
  row.appendChild(inp);
  row.appendChild(d({fontSize:"12px",color:t_.textDim,minWidth:"60px"},[unit]));
  wrap.appendChild(row);
  const barsWrap=d({marginTop:"12px"});
  barsWrap.id=`bars-${at}`;
  const s=scores[at];
  if(s>0){const lbl2=getLabel(s);for(let i=1;i<=5;i++)barsWrap.appendChild(d({display:"inline-block",flex:"1",height:"5px",borderRadius:"3px",background:i<=s?lbl2.color:t_.border,width:"18%",marginRight:"2%"}));}
  wrap.appendChild(barsWrap);
  return wrap;
}

function updateScoreBars(at,pres,scores,t_,val){
  // Update score bars without re-rendering
  const barsWrap=document.getElementById(`bars-${at}`);
  if(!barsWrap)return;
  const{ageBand:ab,gender:g,pushupsVariant:pv,cooperVariant:cv,activity:act}=S;
  if(!ab||!g||!val)return;
  let s=0;
  if(at==="grip")s=scGrip(val,ab,g);
  else if(at==="chair")s=scChair(val,ab,g);
  else if(at==="pushups"&&pv)s=scPush(val,ab,g,pv);
  else if(at==="cooper"&&cv)s=scCoop(val,ab,act,g,cv);
  else if(at==="deadhang")s=scHang(val,ab,g);
  if(s>0){
    const lbl2=getLabel(s);
    barsWrap.innerHTML="";
    for(let i=1;i<=5;i++){
      const bar=document.createElement("div");
      bar.style.cssText=`display:inline-block;height:5px;border-radius:3px;background:${i<=s?lbl2.color:t_.border};width:18%;margin-right:2%;transition:background 0.3s`;
      barsWrap.appendChild(bar);
    }
  }
}

// SRT Calculator
function srtCalc(t_,scores){
  const{srtDown:d_,srtUp:u_,ageBand:ab}=S;
  const ded=x=>x.hand+x.knee+x.forearm+x.bal*0.5;
  const total=srtTotal();
  const thresh=TABLES.srt[ab];
  const s=thresh&&total>0?sc(total,thresh):0;
  const lbl2=s?getLabel(s):null;

  function updSRT(phase,field,delta){
    const max=field==="bal"?1:3;
    if(phase==="down"){S.srtDown={...d_,[field]:Math.max(0,Math.min(max,d_[field]+delta))};}
    else{S.srtUp={...u_,[field]:Math.max(0,Math.min(max,u_[field]+delta))};}
    render();
  }

  const wrap=d({background:t_.bgCard,border:"1px solid #b48ad440",borderRadius:"14px",padding:"16px",marginBottom:"14px"});
  const head=d({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"});
  const hL=d({});
  hL.appendChild(d({fontSize:"9px",letterSpacing:"3px",color:t_.textDim},["CALCULADORA SRT"]));
  hL.appendChild(d({fontSize:"9px",color:"#e8a05a",marginTop:"3px"},["⚠ PIERNAS CRUZADAS obligatorio"]));
  head.appendChild(hL);
  const hR=d({textAlign:"right"});
  hR.appendChild(d({fontFamily:"'Playfair Display',Georgia,serif",fontSize:"40px",color:lbl2?lbl2.color:t_.textDim,lineHeight:"1"},[total.toFixed(1)]));
  hR.appendChild(d({fontSize:"9px",color:lbl2?lbl2.color:t_.textDim,letterSpacing:"1px"},[lbl2?lbl2.text.toUpperCase():"/ 10 PUNTOS"]));
  head.appendChild(hR);
  wrap.appendChild(head);

  const grid=d({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"});
  [{label:"⬇ AL BAJAR",phase:"down",st:d_,col:"#c8a45a"},{label:"⬆ AL SUBIR",phase:"up",st:u_,col:"#8ab4d4"}].forEach(({label,phase,st,col})=>{
    const col2=d({background:t_.bgInput,borderRadius:"10px",padding:"12px"});
    col2.appendChild(d({fontSize:"9px",letterSpacing:"2px",color:col,marginBottom:"8px"},[label]));
    [{field:"hand",label2:"Mano/s",ded:"-1 c/u"},{field:"knee",label2:"Rodilla/s",ded:"-1 c/u"},{field:"forearm",label2:"Antebrazo/s",ded:"-1 c/u"},{field:"bal",label2:"Pérdida equilibrio",ded:"-0.5"}].forEach(({field,label2,ded})=>{
      const row=d({display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 0",borderBottom:`1px solid ${t_.border}`});
      const rL=d({});
      rL.appendChild(d({fontSize:"11px",color:t_.text},[label2]));
      rL.appendChild(d({fontSize:"8px",color:t_.textMuted},[ded]));
      row.appendChild(rL);
      const rR=d({display:"flex",alignItems:"center",gap:"6px"});
      rR.appendChild(btn({width:"26px",height:"26px",borderRadius:"7px",background:t_.bgCard,border:`1px solid ${t_.border}`,color:t_.text,fontSize:"14px"},"−",()=>updSRT(phase,field,-1)));
      rR.appendChild(d({fontSize:"16px",color:st[field]>0?"#d45a5a":t_.textMuted,minWidth:"18px",textAlign:"center"},[String(st[field])]));
      rR.appendChild(btn({width:"26px",height:"26px",borderRadius:"7px",background:t_.bgCard,border:`1px solid ${t_.border}`,color:t_.text,fontSize:"14px"},"+",()=>updSRT(phase,field,+1)));
      row.appendChild(rR);
      col2.appendChild(row);
    });
    col2.appendChild(d({marginTop:"6px",fontSize:"9px",color:t_.textDim,textAlign:"right"},[`Penalización: `,t("color:#d45a5a",`−${ded(st).toFixed(1)}`)]));
    grid.appendChild(col2);
  });
  wrap.appendChild(grid);
  const foot=d({marginTop:"10px",background:t_.bgInput,borderRadius:"8px",padding:"8px 12px",display:"flex",justifyContent:"space-between"});
  foot.appendChild(t({fontSize:"10px",color:t_.textDim},`10 − ${(ded(d_)+ded(u_)).toFixed(1)} penalización`));
  foot.appendChild(t({fontSize:"12px",color:lbl2?lbl2.color:t_.accent},`= ${total.toFixed(1)} puntos`));
  wrap.appendChild(foot);
  if(lbl2)wrap.appendChild(bars(s,lbl2.color,t_));
  return wrap;
}

// RESULTS SCREEN
// ═══════════════════════════════════════════════════════════
function resultsScreen(){
  const t_=T();
  const{ageBand:ab,activity:act,gender:g,skippedSrt,pushupsVariant:pv,cooperVariant:cv,balanceVariant:bv}=S;
  const band=AGE_BANDS.find(b=>b.id===ab);
  const scores=getScores();
  const keys=activeKeys();
  const{pct,total,max,scored}=getPct();
  const totLbl=getTotLabel(pct);
  const balAsym=getBalAsym();
  const date=new Date().toLocaleDateString("es-ES",{day:"2-digit",month:"long",year:"numeric"});

  // Reliability
  const baseScored=scored.filter(k=>k!=="deadhang").length;
  const rel=baseScored>=4?"valid":baseScored===3?"partial":"low";
  const RC={
    valid:{color:"#5ab87a",icon:"✅",label:`Resultado válido · ${scored.length} de ${keys.length} tests`,msg:`Basado en ${scored.length} test${scored.length>1?"s":""} completados.`},
    partial:{color:"#c8a45a",icon:"🟡",label:`Resultado parcial · ${scored.length} de ${keys.length} tests`,msg:"Completa 1 test más para el mínimo recomendado."},
    low:{color:"#d45a5a",icon:"🔴",label:`Resultado no representativo · ${scored.length} de ${keys.length} tests`,msg:`Completa al menos ${4-baseScored} test${4-baseScored>1?"s":""} más.`},
  }[rel];

  const priorityTests=keys.filter(k=>{
    if(skippedSrt&&k==="srt")return false;
    if(k==="balance")return S.balR||S.balL;
    if(k==="srt")return srtTotal()>0;
    if(k==="pushups")return S.pushups&&pv;
    if(k==="cooper")return S.cooper&&cv;
    return S[k];
  }).sort((a,b)=>(scores[a]||0)-(scores[b]||0));

  const deficits=priorityTests.filter(k=>(scores[k]||0)<=2);
  const strong=priorityTests.filter(k=>(scores[k]||0)>=4);

  function diagText(){
    if(scored.length===0)return"Completa al menos un test para ver el diagnóstico.";
    let tx="";
    if(pct>=75)tx+=`${S.name||"El cliente"} presenta una condición física por encima de la media para su perfil (${band?.desc}, ${S.age} años). `;
    else if(pct>=55)tx+=`${S.name||"El cliente"} presenta una condición funcional dentro de la media con áreas de mejora. `;
    else tx+=`${S.name||"El cliente"} presenta déficits funcionales que requieren un programa de intervención estructurado. `;
    if(strong.length>0)tx+=`Puntos fuertes: ${strong.map(k=>TEST_LABELS[k]).join(", ")}. `;
    if(deficits.length>0)tx+=`Prioridades inmediatas: ${deficits.map(k=>TEST_LABELS[k]).join(", ")}. `;
    if(skippedSrt)tx+="Limitación funcional registrada en SRT. ";
    if(deficits.length===0&&pct>=55)tx+="No se detectan déficits críticos. Mantener y progresar.";
    return tx;
  }

  const wrap=d({});
  const inner=e("div",{cls:"main-inner",style:{maxWidth:"860px",margin:"0 auto",padding:"36px 24px"}});

  // Header
  const hdr=d({marginBottom:"28px"});
  hdr.appendChild(d({fontSize:"9px",letterSpacing:"5px",color:t_.accent,marginBottom:"8px"},["INFORME DE EVALUACIÓN"]));
  inner.appendChild(e("h1",{style:{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"38px",fontWeight:"400",color:t_.text,marginBottom:"4px"}},[S.name||"Cliente"]));
  inner.appendChild(d({fontSize:"11px",color:t_.textDim,marginBottom:"28px"},[`${S.age} años · ${band?.desc} · ${act==="active"?"Activo":"Sedentario"} · ${g==="m"?"Hombre":"Mujer"} · ${date}`]));

  // Total score
  const totBox=e("div",{cls:"score-box",style:{background:t_.grad,border:`1px solid ${totLbl.color}40`,borderRadius:"18px",padding:"24px",marginBottom:"14px",display:"grid",gridTemplateColumns:"1fr auto",gap:"16px",alignItems:"center"}});
  const tL=d({});
  tL.appendChild(d({fontSize:"9px",letterSpacing:"3px",color:t_.textDim,marginBottom:"8px"},["PUNTUACIÓN GLOBAL"]));
  const tNum=d({fontFamily:"'Playfair Display',Georgia,serif",fontSize:"50px",color:totLbl.color,lineHeight:"1",marginBottom:"4px"});
  tNum.innerHTML=`${pct}<span style="font-size:20px">%</span>`;
  tL.appendChild(tNum);
  tL.appendChild(d({fontFamily:"'Playfair Display',Georgia,serif",fontSize:"18px",color:totLbl.color,marginBottom:"4px"},[totLbl.text]));
  tL.appendChild(d({fontSize:"11px",color:t_.textDim,lineHeight:"1.6"},[totLbl.desc]));
  totBox.appendChild(tL);
  const tR=e("div",{cls:"score-right",style:{textAlign:"right"}});
  tR.appendChild(d({fontSize:"9px",color:t_.textDim,marginBottom:"3px"},["PUNTOS"]));
  tR.appendChild(d({fontFamily:"'Playfair Display',Georgia,serif",fontSize:"30px",color:t_.text},[String(total)]));
  tR.appendChild(d({fontSize:"10px",color:t_.textDim},[`de ${max}`]));
  totBox.appendChild(tR);
  inner.appendChild(totBox);

  // Reliability
  const relDiv=d({background:RC.color+"15",border:`1px solid ${RC.color}30`,borderRadius:"12px",padding:"10px 14px",marginBottom:"14px",display:"flex",alignItems:"center",gap:"10px"});
  relDiv.appendChild(d({fontSize:"14px"},[RC.icon]));
  const relT=d({flex:"1"});
  relT.appendChild(d({fontSize:"11px",color:RC.color,fontWeight:"600"},[RC.label]));
  relT.appendChild(d({fontSize:"10px",color:t_.textDim,marginTop:"2px"},[RC.msg]));
  relDiv.appendChild(relT);
  inner.appendChild(relDiv);

  // Diagnosis
  const diagDiv=d({background:t_.bgCard,border:`1px solid ${rel==="low"?t_.border:totLbl.color+"30"}`,borderRadius:"14px",padding:"18px",marginBottom:"18px",borderLeft:`4px solid ${rel==="low"?t_.border:totLbl.color}`,opacity:rel==="low"?"0.6":"1"});
  const diagHead=d({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"});
  diagHead.appendChild(d({fontSize:"9px",letterSpacing:"3px",color:rel==="low"?t_.textMuted:totLbl.color},["DIAGNÓSTICO"]));
  if(rel==="low")diagHead.appendChild(d({fontSize:"9px",color:"#d45a5a"},["⚠ No fiable con <4 tests"]));
  diagDiv.appendChild(diagHead);
  const diagP=e("p",{style:{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"13px",color:rel==="low"?t_.textDim:t_.text,lineHeight:"1.7",fontStyle:"italic"}});
  diagP.textContent=`"${diagText()}"`;
  diagDiv.appendChild(diagP);
  inner.appendChild(diagDiv);

  // Test grid
  const grid=e("div",{cls:"results-grid",style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"10px",marginBottom:"22px"}});
  keys.forEach(k=>{
    const isH=k==="deadhang";
    const pres=PRES[k];
    const hi=HEALTH[k];
    const done=skippedSrt&&k==="srt"?true:(k==="balance"?(S.balR||S.balL):(k==="srt"?srtTotal()>0:(k==="pushups"?S.pushups&&pv:(k==="cooper"?S.cooper&&cv:S[k]))));

    if(!done){
      const c=d({background:t_.bgCard,border:`1px solid ${t_.border}`,borderRadius:"12px",padding:"14px",opacity:"0.3"});
      c.appendChild(d({fontSize:"10px",color:t_.textMuted},[TEST_LABELS[k].toUpperCase()]));
      c.appendChild(d({fontSize:"10px",color:t_.textMuted,marginTop:"3px"},["Sin datos"]));
      grid.appendChild(c);return;
    }
    if(skippedSrt&&k==="srt"){
      const c=d({background:t_.bgCard,border:"1px solid #e8a05a30",borderRadius:"12px",padding:"14px"});
      c.appendChild(d({fontSize:"10px",color:"#e8a05a",marginBottom:"3px"},[TEST_LABELS[k].toUpperCase()]));
      c.appendChild(d({fontSize:"11px",color:"#e8a05a"},["Limitación funcional"]));
      grid.appendChild(c);return;
    }

    const s=scores[k]||0;
    const lbl2=getLabel(s);
    const isActive=S.activePres===k;
    const c=d({background:t_.bgCard,border:`1px solid ${isActive?pres.color:t_.border}`,borderRadius:"12px",padding:"14px",cursor:"pointer",transition:"border 0.2s"});
    const cH=d({display:"flex",justifyContent:"space-between",marginBottom:"7px"});
    cH.appendChild(d({fontSize:"18px"},[pres.icon]));
    cH.appendChild(d({fontFamily:"'Playfair Display',Georgia,serif",fontSize:"28px",color:lbl2.color,lineHeight:"1"},[String(s)]));
    c.appendChild(cH);
    const nameEl=d({fontSize:"10px",color:t_.textDim,marginBottom:"2px"});
    let nameT=TEST_LABELS[k].toUpperCase();
    if(isH)nameT+=" ★";
    if(k==="pushups"&&pv)nameT+=` · ${pv==="knees"?"rodillas":"plancha"}`;
    if(k==="balance"&&bv)nameT+=` · ${bv==="closed"?"OC":"OA"}`;
    if(k==="cooper"&&cv)nameT+=` · ${cv==="walk"?"6min":"12min"}`;
    nameEl.textContent=nameT;
    c.appendChild(nameEl);
    c.appendChild(d({fontSize:"11px",color:lbl2.color,marginBottom:"5px"},[lbl2.text]));
    c.appendChild(bars(s,lbl2.color,t_));
    // Value
    let val="";
    if(k==="balance")val=`D:${S.balR||"—"}s / I:${S.balL||"—"}s${balAsym?` · Asim.${balAsym}%`:""}`;
    else if(k==="srt")val=`${srtTotal().toFixed(1)} pts`;
    else if(k==="grip")val=`${S.grip} kg`;
    else if(k==="chair")val=`${S.chair} rep`;
    else if(k==="pushups")val=`${S.pushups} rep`;
    else if(k==="cooper")val=`${S.cooper}m`;
    else if(k==="deadhang")val=`${S.deadhang}s`;
    c.appendChild(d({fontSize:"9px",color:t_.textMuted,marginTop:"4px"},[val]));
    c.appendChild(d({fontSize:"8px",color:t_.textMuted,marginTop:"4px",lineHeight:"1.3"},[hi.text.split(".")[0]+"."]));
    if(k==="balance"&&balAsym&&parseFloat(balAsym)>20)c.appendChild(d({marginTop:"4px",fontSize:"9px",color:"#e8a05a"},["⚠ Asimetría significativa"]));
    if(s<=2&&!isH)c.appendChild(d({marginTop:"4px",fontSize:"8px",color:pres.color},["⚠ TAP → PLAN DE MEJORA"]));
    c.addEventListener("click",()=>{S.activePres=S.activePres===k?null:k;render();});
    grid.appendChild(c);
  });
  inner.appendChild(grid);

  // Prescription panel
  if(S.activePres&&PRES[S.activePres]){
    const pres=PRES[S.activePres];
    const pd=d({background:t_.bgCard,border:`1px solid ${pres.color}50`,borderRadius:"16px",padding:"22px",marginBottom:"18px"});
    const pdH=d({display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"14px"});
    const pdHL=d({});
    pdHL.appendChild(d({fontSize:"9px",letterSpacing:"3px",color:pres.color,marginBottom:"5px"},["PLAN DE MEJORA"]));
    pdHL.appendChild(e("h3",{style:{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"19px",fontWeight:"400",color:t_.text}},[pres.name]));
    pdH.appendChild(pdHL);
    pdH.appendChild(btn({background:"none",border:"none",color:t_.textDim,fontSize:"20px"},"×",()=>{S.activePres=null;render();}));
    pd.appendChild(pdH);
    const whatDiv=d({background:t_.bgInput,borderRadius:"10px",padding:"12px",marginBottom:"14px",borderLeft:`3px solid ${pres.color}`});
    whatDiv.appendChild(e("p",{style:{fontSize:"11px",color:t_.textDim,lineHeight:"1.7"}},[pres.what]));
    pd.appendChild(whatDiv);
    pd.appendChild(d({fontSize:"9px",letterSpacing:"3px",color:t_.textDim,marginBottom:"10px"},["EJERCICIOS"]));
    pres.exercises.forEach((ex,i)=>{
      const exDiv=d({background:t_.bgInput,borderRadius:"10px",padding:"12px",marginBottom:"7px"});
      const exR=d({display:"flex",gap:"10px",marginBottom:"5px"});
      exR.appendChild(d({fontFamily:"'Playfair Display',Georgia,serif",fontSize:"16px",color:pres.color,minWidth:"22px"},[String(i+1)]));
      const exL=d({});
      exL.appendChild(d({fontSize:"12px",fontFamily:"'Playfair Display',Georgia,serif",color:t_.text,marginBottom:"4px"},[ex.name]));
      const tags=d({display:"flex",gap:"5px",flexWrap:"wrap"});
      [["Series",ex.sets],["Reps",ex.reps],["Carga",ex.load]].forEach(([l,v])=>{
        const tag=d({background:t_.bgCard,borderRadius:"4px",padding:"2px 7px"});
        tag.appendChild(t({fontSize:"8px",color:t_.textMuted},`${l}: `));
        tag.appendChild(t({fontSize:"9px",color:t_.textDim},v));
        tags.appendChild(tag);
      });
      exL.appendChild(tags);
      exR.appendChild(exL);
      exDiv.appendChild(exR);
      exDiv.appendChild(d({fontSize:"10px",color:t_.textDim,lineHeight:"1.5",paddingLeft:"32px"},[ex.note]));
      pd.appendChild(exDiv);
    });
    const pgrid=d({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginTop:"4px"});
    [["FRECUENCIA",pres.freq],["PROGRESIÓN",pres.prog]].forEach(([k,v])=>{
      const pg=d({background:t_.bgInput,borderRadius:"10px",padding:"10px"});
      pg.appendChild(d({fontSize:"8px",letterSpacing:"2px",color:t_.textDim,marginBottom:"4px"},[k]));
      pg.appendChild(d({fontSize:"10px",color:t_.text,lineHeight:"1.6"},[v]));
      pgrid.appendChild(pg);
    });
    pd.appendChild(pgrid);
    inner.appendChild(pd);
  }

  // Priorities
  if(priorityTests.length>0){
    const prioDiv=d({background:t_.bgCard,border:`1px solid ${t_.border}`,borderRadius:"16px",padding:"22px",marginBottom:"18px"});
    prioDiv.appendChild(d({fontSize:"9px",letterSpacing:"3px",color:t_.accent,marginBottom:"12px"},["PRIORIDADES DE ENTRENAMIENTO"]));
    priorityTests.forEach((k,i)=>{
      const s=scores[k]||0;const lbl2=getLabel(s);const pres=PRES[k];
      const row=e("div",{cls:"prio-grid",style:{display:"grid",gridTemplateColumns:"26px 1fr auto auto",gap:"12px",alignItems:"center",padding:"8px 0",borderBottom:i<priorityTests.length-1?`1px solid ${t_.border}`:"none"}});
      row.appendChild(d({fontFamily:"'Playfair Display',Georgia,serif",fontSize:"16px",color:t_.border},[String(i+1)]));
      const rL=d({});
      rL.appendChild(d({fontSize:"12px",fontFamily:"'Playfair Display',Georgia,serif",color:t_.text},[`${pres.icon} ${TEST_LABELS[k]}`]));
      if(s<=2)rL.appendChild(d({fontSize:"9px",color:"#e8a05a",marginTop:"1px"},["⚠ DÉFICIT SIGNIFICATIVO"]));
      row.appendChild(rL);
      row.appendChild(d({fontFamily:"'Playfair Display',Georgia,serif",fontSize:"22px",color:lbl2.color},[String(s)]));
      row.appendChild(btn({background:pres.color+"20",border:`1px solid ${pres.color}50`,borderRadius:"7px",padding:"4px 9px",color:pres.color,fontSize:"10px"},"VER PLAN",()=>{S.activePres=k;window.scrollTo({top:9999,behavior:"smooth"});render();}));
      prioDiv.appendChild(row);
    });
    inner.appendChild(prioDiv);
  }

  // PDF Button
  inner.appendChild(btn({width:"100%",background:t_.accentBg,border:`1px solid ${t_.accentBorder}`,borderRadius:"12px",padding:"13px",color:t_.accent,fontSize:"13px",marginBottom:"10px"},"📄 Guardar PDF / Compartir",()=>generatePDF(scores,keys,date,band)));

  // Action buttons
  const actRow=d({display:"flex",gap:"10px"});
  actRow.appendChild(btn({flex:"1",background:"transparent",border:`1px solid ${t_.border}`,borderRadius:"12px",padding:"11px",color:t_.textDim,fontSize:"11px"},"← Editar",()=>{S.screen="tests";render();}));
  actRow.appendChild(btn({flex:"1",background:t_.btn,border:"none",borderRadius:"12px",padding:"11px",color:t_.btnText,fontSize:"12px",letterSpacing:"2px"},"NUEVO CLIENTE",()=>{
    Object.assign(S,{screen:"setup",name:"",age:"",ageBand:null,activity:null,gender:null,hangEnabled:false,activeTest:"grip",pushupsVariant:null,balanceVariant:null,cooperVariant:null,skippedSrt:false,grip:"",chair:"",pushups:"",balR:"",balL:"",srtDown:{hand:0,knee:0,forearm:0,bal:0},srtUp:{hand:0,knee:0,forearm:0,bal:0},cooper:"",deadhang:"",activePres:null});
    render();
  }));
  inner.appendChild(actRow);

  wrap.appendChild(inner);
  return wrap;
}

// ═══════════════════════════════════════════════════════════
// PDF GENERATOR
// ═══════════════════════════════════════════════════════════
function generatePDF(scores,keys,date,band){
  const{skippedSrt,pushupsVariant:pv,cooperVariant:cv,balanceVariant:bv}=S;
  const{pct,total,max,scored}=getPct();
  const totLbl=getTotLabel(pct);
  const balAsym=getBalAsym();
  const baseScored=scored.filter(k=>k!=="deadhang").length;
  const rel=baseScored>=4?"Resultado válido":baseScored===3?"Resultado parcial":"Resultado no representativo";

  const priorityTests=keys.filter(k=>{
    if(skippedSrt&&k==="srt")return false;
    if(k==="balance")return S.balR||S.balL;
    if(k==="srt")return srtTotal()>0;
    if(k==="pushups")return S.pushups&&pv;
    if(k==="cooper")return S.cooper&&cv;
    return S[k];
  }).sort((a,b)=>(scores[a]||0)-(scores[b]||0));
  const deficits=priorityTests.filter(k=>(scores[k]||0)<=2).map(k=>`${PRES[k].icon} ${TEST_LABELS[k]}`);
  const strong=priorityTests.filter(k=>(scores[k]||0)>=4).map(k=>`${PRES[k].icon} ${TEST_LABELS[k]}`);

  let rows="";
  keys.forEach(k=>{
    const pres=PRES[k];
    const done=skippedSrt&&k==="srt"?true:(k==="balance"?(S.balR||S.balL):(k==="srt"?srtTotal()>0:(k==="pushups"?S.pushups&&pv:(k==="cooper"?S.cooper&&cv:S[k]))));
    if(!done){rows+=`<tr><td>${pres.icon} ${TEST_LABELS[k]}</td><td colspan="3" style="color:#999">Sin datos</td></tr>`;return;}
    if(skippedSrt&&k==="srt"){rows+=`<tr><td>${pres.icon} ${TEST_LABELS[k]}</td><td colspan="3" style="color:#e8a05a">Limitación funcional registrada</td></tr>`;return;}
    const s=scores[k]||0;const lbl2=getLabel(s);
    let val="";
    if(k==="balance")val=`D:${S.balR||"—"}s / I:${S.balL||"—"}s${balAsym?` · Asim.${balAsym}%`:""}`;
    else if(k==="srt")val=`${srtTotal().toFixed(1)} puntos`;
    else if(k==="grip")val=`${S.grip} kg`;
    else if(k==="chair")val=`${S.chair} rep`;
    else if(k==="pushups")val=`${S.pushups} rep (${pv==="knees"?"rodillas":"plancha"})`;
    else if(k==="cooper")val=`${S.cooper}m (${cv==="walk"?"6min caminando":"12min corriendo"})`;
    else if(k==="deadhang")val=`${S.deadhang}s`;
    const dotsFill="●".repeat(s)+"○".repeat(5-s);
    rows+=`<tr><td>${pres.icon} ${TEST_LABELS[k]}</td><td style="color:${lbl2.color};font-weight:bold">${s}/5 ${lbl2.text}</td><td>${val}</td><td style="color:${lbl2.color}">${dotsFill}</td></tr>`;
  });

  const html=`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Evaluación — ${S.name||"Cliente"}</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:monospace;background:#f5f2ee;color:#1a1a1a;padding:28px;max-width:720px;margin:0 auto}.header{border-bottom:3px solid #3dd6a3;padding-bottom:16px;margin-bottom:20px}.brand{font-size:9px;letter-spacing:5px;color:#3dd6a3;margin-bottom:6px}h1{font-family:'Playfair Display',Georgia,serif;font-size:30px;font-weight:400;margin-bottom:4px}.meta{font-size:11px;color:#6a6050;margin-top:3px}.score-box{background:#1e2535;color:#e2e8f0;border-radius:12px;padding:18px 22px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}.score-pct{font-family:'Playfair Display',Georgia,serif;font-size:44px;line-height:1}.score-lbl{font-family:'Playfair Display',Georgia,serif;font-size:17px;margin-top:3px}.score-desc{font-size:11px;color:#718096;margin-top:3px;max-width:320px}.score-pts{text-align:right}.score-pts .num{font-family:'Playfair Display',Georgia,serif;font-size:28px}.score-pts .sub{font-size:10px;color:#718096}.rel{font-size:10px;color:#4a5568;background:#e8e4dc;border-radius:8px;padding:7px 10px;margin-bottom:16px}.sec{font-size:9px;letter-spacing:3px;color:#4a7c6f;margin-bottom:8px;margin-top:16px}.pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}.pill{border-radius:16px;padding:3px 10px;font-size:11px}.pill.g{background:#5ab87a20;color:#2d8a52;border:1px solid #5ab87a40}.pill.r{background:#d45a5a20;color:#d45a5a;border:1px solid #d45a5a40}table{width:100%;border-collapse:collapse;margin-bottom:16px}th{text-align:left;font-size:9px;letter-spacing:2px;color:#6a6050;border-bottom:2px solid #ddd9d0;padding:7px 8px}td{padding:9px 8px;border-bottom:1px solid #e8e4dc;font-size:12px;vertical-align:middle}.footer{margin-top:22px;border-top:1px solid #ddd9d0;padding-top:12px;font-size:9px;color:#b0a898;display:flex;justify-content:space-between}@media print{body{padding:0}@page{margin:1.5cm;size:A4}}</style></head><body>
<div class="header"><div class="brand">EVALUACIÓN FÍSICA FUNCIONAL</div><h1>${S.name||"Cliente"}</h1><div class="meta">${S.age} años · ${band?.desc} (${band?.label}) · ${S.activity==="active"?"Activo":"Sedentario"} · ${S.gender==="m"?"Hombre":"Mujer"} · ${date}</div></div>
<div class="score-box"><div><div class="score-pct" style="color:${totLbl.color}">${pct}%</div><div class="score-lbl" style="color:${totLbl.color}">${totLbl.text}</div><div class="score-desc">${totLbl.desc}</div></div><div class="score-pts"><div class="num">${total}</div><div class="sub">de ${max} puntos</div><div class="sub" style="margin-top:3px">${rel}</div></div></div>
${strong.length>0||deficits.length>0?`<div class="sec">RESUMEN</div>${strong.length>0?`<p style="font-size:11px;color:#6a6050;margin-bottom:5px">✅ Puntos fuertes:</p><div class="pills">${strong.map(s=>`<span class="pill g">${s}</span>`).join("")}</div>`:""}${deficits.length>0?`<p style="font-size:11px;color:#6a6050;margin-bottom:5px;margin-top:6px">⚠️ Prioridades:</p><div class="pills">${deficits.map(d=>`<span class="pill r">${d}</span>`).join("")}</div>`:""}`:""}
<div class="sec" style="margin-top:18px">RESULTADOS POR TEST</div>
<table><thead><tr><th>TEST</th><th>PUNTUACIÓN</th><th>RESULTADO</th><th>NIVEL</th></tr></thead><tbody>${rows}</tbody></table>
<div class="footer"><span>Evaluación Física Funcional · longevity-test.vercel.app</span><span>${date}</span></div>
</body></html>`;

  // Create blob and open — works better on mobile Safari
  const blob=new Blob([html],{type:"text/html"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`evaluacion-${(S.name||"cliente").replace(/\s+/g,"-").toLowerCase()}-${new Date().toISOString().split("T")[0]}.html`;
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
}

// ═══════════════════════════════════════════════════════════
// MAIN RENDER — only called on screen changes, not on input
// ═══════════════════════════════════════════════════════════
function render(){
  const t_=T();
  document.body.style.background=t_.bg;
  document.body.style.color=t_.text;
  // Apply CSS variable for border (used in media query classes)
  document.documentElement.style.setProperty("--border",t_.border);
  document.documentElement.style.setProperty("--accent",t_.accent);

  const app=document.getElementById("app");
  app.innerHTML="";

  if(S.screen==="login"){
    document.body.style.background="#151c2c";
    app.appendChild(loginScreen());
    return;
  }

  app.appendChild(themeSwitcher());
  if(S.screen==="setup")app.appendChild(setupScreen());
  else if(S.screen==="tests")app.appendChild(testsScreen());
  else if(S.screen==="results")app.appendChild(resultsScreen());
}

render();
</script>
</body>
</html>
